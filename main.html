<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Editor & Player</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jeopardy-blue { background-color: #060ce9; }
        .jeopardy-gold { color: #ffcc00; }
        [contenteditable]:focus { outline: 2px solid #ffcc00; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden">

<div id="app" class="p-4 min-h-screen flex flex-col">
    <h1 class="text-4xl text-center mb-8 font-bold jeopardy-gold uppercase tracking-widest outline-none"
        :contenteditable="isEditing" 
        @blur="updateTitle($event)">
        {{ gameData.title }}
    </h1>

    <div class="grid grid-cols-5 gap-2 max-w-6xl mx-auto flex-grow">
        <div v-for="(cat, cIdx) in gameData.categories" :key="'h-'+cIdx" 
             class="jeopardy-blue border-2 border-white p-2 text-center font-bold text-lg uppercase h-20 flex items-center justify-center overflow-hidden">
            <span :contenteditable="isEditing" @blur="updateCatName(cIdx, $event)">{{ cat.name }}</span>
        </div>

        <template v-for="rIdx in [0, 1, 2, 3, 4]">
            <div v-for="(cat, cIdx) in gameData.categories" :key="cIdx + '-' + rIdx"
                 @click="handleTileClick(cIdx, rIdx)"
                 class="jeopardy-blue border-2 border-white aspect-video flex items-center justify-center text-center p-2 cursor-pointer hover:bg-blue-700 transition-colors relative"
                 :class="{ 'opacity-30': cat.questions[rIdx].done && !isEditing }">
                
                <span v-if="!isEditing" class="jeopardy-gold text-4xl font-bold">
                    {{ (rIdx + 1) * 100 }}
                </span>
                <span v-else class="text-xs italic opacity-80 line-clamp-3">
                    Q: {{ cat.questions[rIdx].q || 'Leer' }}
                </span>
            </div>
        </template>
    </div>

    <div class="fixed bottom-6 left-6 flex gap-4">
        <button @click="isEditing = !isEditing" 
                class="w-14 h-14 bg-yellow-500 text-black rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition-transform">
            <span v-if="!isEditing" title="Editor öffnen">✎</span>
            <span v-else title="Spiel starten">▶</span>
        </button>
        
        <button v-if="isEditing" @click="downloadJSON" 
                class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-bold shadow-lg hover:bg-green-700">
            Game.json exportieren
        </button>
    </div>

    <div v-if="activeTile" class="fixed inset-0 bg-blue-900 flex flex-col items-center justify-center p-6 z-50">
        <div class="max-w-3xl w-full bg-blue-800 p-8 border-4 border-white rounded-xl shadow-2xl">
            <h2 class="text-xl mb-6 opacity-60 uppercase tracking-widest">
                {{ gameData.categories[activeTile.cIdx].name }} - {{ (activeTile.rIdx + 1) * 100 }} Punkte
            </h2>

            <div v-if="!isEditing">
                <p class="text-5xl font-bold mb-12">{{ showAnswer ? activeTile.data.a : activeTile.data.q }}</p>
                <div class="flex gap-4 justify-center">
                    <button @click="showAnswer = true" v-if="!showAnswer" class="bg-white text-blue-900 px-8 py-3 rounded-full font-bold uppercase">Lösung zeigen</button>
                    <button @click="closeTile(true)" v-if="showAnswer" class="bg-yellow-500 text-black px-8 py-3 rounded-full font-bold uppercase">Abhaken</button>
                    <button @click="closeTile(false)" class="border border-white px-8 py-3 rounded-full font-bold uppercase">Abbrechen</button>
                </div>
            </div>

            <div v-else>
                <label class="block text-left mb-2 text-yellow-400 font-bold uppercase">Frage:</label>
                <textarea v-model="activeTile.data.q" class="w-full bg-black text-white p-4 mb-6 rounded border border-white text-xl" rows="3"></textarea>
                
                <label class="block text-left mb-2 text-yellow-400 font-bold uppercase">Antwort:</label>
                <textarea v-model="activeTile.data.a" class="w-full bg-black text-white p-4 mb-6 rounded border border-white text-xl" rows="3"></textarea>
                
                <button @click="closeTile(false)" class="w-full bg-green-500 text-black py-3 rounded font-bold uppercase">Speichern & Schließen</button>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue

createApp({
    data() {
        return {
            isEditing: false,
            showAnswer: false,
            activeTile: null,
            gameData: {
                title: "MEIN JEOPARDY",
                categories: Array.from({length: 5}, (_, i) => ({
                    name: "Kategorie " + (i+1),
                    questions: Array.from({length: 5}, () => ({ q: "", a: "", done: false }))
                }))
            }
        }
    },
    methods: {
        handleTileClick(cIdx, rIdx) {
            this.activeTile = {
                cIdx, rIdx,
                data: this.gameData.categories[cIdx].questions[rIdx]
            };
            this.showAnswer = false;
        },
        closeTile(markAsDone) {
            if (markAsDone) this.activeTile.data.done = true;
            this.activeTile = null;
        },
        updateTitle(e) { this.gameData.title = e.target.innerText; },
        updateCatName(idx, e) { this.gameData.categories[idx].name = e.target.innerText; },
        downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.gameData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "game.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    }
}).mount('#app')
</script>
</body>
</html>
