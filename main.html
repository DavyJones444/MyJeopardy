<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Pro - Smart Parser</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jeopardy-blue { background-color: #060ce9; }
        .jeopardy-gold { color: #ffcc00; }
        .media-content img { max-height: 250px; border: 3px solid white; border-radius: 8px; margin: 10px auto; }
        .media-content video { max-height: 300px; margin: 10px auto; }
        [contenteditable]:focus { outline: 2px solid #ffcc00; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden">

<div id="app" class="p-4 min-h-screen flex flex-col">
    
    <div class="flex justify-between items-center mb-6 px-4">
        <h1 class="text-3xl font-bold jeopardy-gold uppercase" :contenteditable="isEditing" @blur="gameData.title = $event.target.innerText">
            {{ gameData.title }}
        </h1>
        <div class="flex gap-2">
            <input type="file" id="fileInput" class="hidden" @change="loadJSON" accept=".json">
            <button @click="triggerUpload" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded text-xs font-bold border border-gray-600">
                LADEN
            </button>
        </div>
    </div>

    <div class="grid grid-cols-5 gap-2 max-w-7xl mx-auto w-full flex-grow">
        <div v-for="(cat, cIdx) in gameData.categories" :key="'h-'+cIdx" 
             class="jeopardy-blue border-2 border-white p-2 text-center font-bold text-sm lg:text-lg uppercase h-20 flex items-center justify-center shadow-lg">
            <span :contenteditable="isEditing" @blur="cat.name = $event.target.innerText">{{ cat.name }}</span>
        </div>

        <template v-for="rIdx in [0,1,2,3,4]">
            <div v-for="(cat, cIdx) in gameData.categories" @click="handleTileClick(cIdx, rIdx)"
                 class="jeopardy-blue border-2 border-white aspect-video flex items-center justify-center text-center p-2 cursor-pointer hover:scale-[1.02] transition-all"
                 :class="{ 'opacity-10 pointer-events-none': cat.questions[rIdx].done && !isEditing }">
                <span v-if="!isEditing" class="jeopardy-gold text-2xl lg:text-5xl font-bold">{{ (rIdx + 1) * 100 }}</span>
                <span v-else class="text-[10px] uppercase opacity-50 line-clamp-2 italic">{{ cat.questions[rIdx].q }}</span>
            </div>
        </template>
    </div>

    <div class="mt-8 mb-20 flex flex-wrap justify-center items-end gap-4">
        <div v-for="(team, tIdx) in gameData.teams" :key="tIdx" class="jeopardy-blue border-2 border-white w-40 p-2 relative group shadow-xl">
            <button @click="removeTeam(tIdx)" class="absolute -top-2 -right-2 bg-red-600 w-5 h-5 rounded-full text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
            <div class="text-center">
                <div class="font-bold uppercase text-[10px] mb-1 truncate px-2" contenteditable="true" @blur="team.name = $event.target.innerText">{{ team.name }}</div>
                <div class="text-2xl font-black jeopardy-gold" contenteditable="true" @blur="team.score = parseInt($event.target.innerText) || 0">{{ team.score }}</div>
            </div>
        </div>
        <button @click="addTeam" class="w-10 h-10 border-2 border-dashed border-gray-500 rounded flex items-center justify-center text-gray-500 hover:text-white">+</button>
    </div>

    <div class="fixed bottom-6 left-6 flex gap-4 z-[60]">
        <button @click="isEditing = !isEditing" class="w-14 h-14 bg-yellow-500 text-black rounded-full shadow-2xl flex items-center justify-center text-2xl">
            {{ isEditing ? '▶' : '✎' }}
        </button>
        <button v-if="isEditing" @click="downloadJSON" class="bg-green-600 px-6 py-4 rounded-full font-bold uppercase text-xs">Export</button>
    </div>

    <div v-if="activeTile" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-blue-900 border-4 border-white w-full max-w-4xl p-8 rounded-xl relative overflow-y-auto max-h-[90vh]">
            
            <div v-if="isEditing">
                <h3 class="text-yellow-400 font-bold mb-4 uppercase">Editor Mode</h3>
                <div class="grid gap-4">
                    <div>
                        <label class="text-xs text-gray-300">FRAGE (Nutze /image(url), /video(url) oder /audio(url))</label>
                        <textarea v-model="activeTile.data.q" class="w-full bg-black p-4 mt-1 h-32 rounded border border-white/20"></textarea>
                    </div>
                    <div>
                        <label class="text-xs text-gray-300">ANTWORT</label>
                        <textarea v-model="activeTile.data.a" class="w-full bg-black p-4 mt-1 h-24 rounded border border-white/20"></textarea>
                    </div>
                </div>
                <button @click="activeTile = null" class="w-full bg-green-600 mt-6 py-3 font-bold uppercase rounded">Speichern</button>
            </div>

            <div v-else class="text-center">
                <div class="uppercase text-white/50 mb-6 text-sm">{{ activeTile.catName }} | {{ (activeTile.rIdx + 1) * 100 }}</div>
                
                <div class="media-content mb-8 text-3xl lg:text-5xl font-bold leading-tight">
                    <div v-html="parseContent(showAnswer ? activeTile.data.a : activeTile.data.q)"></div>
                </div>

                <div class="flex gap-4 justify-center">
                    <button @click="showAnswer = true" v-if="!showAnswer" class="bg-white text-blue-900 px-10 py-4 rounded-full font-black text-2xl uppercase">Lösung</button>
                    <button @click="closeTile(true)" v-else class="bg-yellow-500 text-black px-10 py-4 rounded-full font-black text-2xl uppercase">Fertig</button>
                    <button @click="activeTile = null" class="border border-white/30 px-6 py-4 rounded-full font-bold uppercase">Zurück</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue
createApp({
    data() {
        return {
            isEditing: false, showAnswer: false, activeTile: null,
            gameData: { title: "MIXED MEDIA JEOPARDY", teams: [{ name: "Team 1", score: 0 }], categories: Array.from({length: 5}, (_, i) => ({ name: "KAT " + (i+1), questions: Array.from({length: 5}, () => ({ q: "Frage /image(url)", a: "Antwort", done: false })) })) }
        }
    },
    methods: {
        parseContent(text) {
            if (!text) return "";
            // Regex für /type(url)
            const mediaRegex = /\/(image|video|audio)\(([^)]+)\)/g;
            
            return text.replace(mediaRegex, (match, type, url) => {
                if (type === 'image') return `<img src="${url}" class="mx-auto my-4 shadow-lg">`;
                if (type === 'video') return `<video src="${url}" controls autoplay class="mx-auto my-4 w-full"></video>`;
                if (type === 'audio') return `<div class="bg-black/30 p-4 rounded my-4"><audio src="${url}" controls autoplay class="mx-auto"></audio></div>`;
                return match;
            });
        },
        handleTileClick(cIdx, rIdx) {
            this.activeTile = { cIdx, rIdx, catName: this.gameData.categories[cIdx].name, data: this.gameData.categories[cIdx].questions[rIdx] };
            this.showAnswer = false;
        },
        closeTile(done) { if(done) this.activeTile.data.done = true; this.activeTile = null; },
        addTeam() { this.gameData.teams.push({ name: "Team " + (this.gameData.teams.length + 1), score: 0 }); },
        removeTeam(idx) { if(confirm("Team löschen?")) this.gameData.teams.splice(idx, 1); },
        triggerUpload() { document.getElementById('fileInput').click(); },
        loadJSON(e) {
            const reader = new FileReader();
            reader.onload = (event) => { this.gameData = JSON.parse(event.target.result); };
            reader.readAsText(e.target.files[0]);
        },
        downloadJSON() {
            const blob = new Blob([JSON.stringify(this.gameData, null, 2)], {type : 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'game.json'; a.click();
        }
    }
}).mount('#app')
</script>
</body>
</html>
