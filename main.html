<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Pro - Media & Upload</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jeopardy-blue { background-color: #060ce9; }
        .jeopardy-gold { color: #ffcc00; }
        .media-container img, .media-container video { max-height: 300px; margin: 0 auto; }
    </style>
</head>
<body class="bg-black text-white font-sans">

<div id="app" class="p-4 min-h-screen">
    <div class="flex justify-between items-center mb-6 px-10">
        <h1 class="text-3xl font-bold jeopardy-gold uppercase" :contenteditable="isEditing" @blur="gameData.title = $event.target.innerText">
            {{ gameData.title }}
        </h1>
        <div class="flex gap-2">
            <input type="file" id="fileInput" class="hidden" @change="loadJSON" accept=".json">
            <button @click="triggerUpload" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-bold">
                Datei laden (game.json)
            </button>
        </div>
    </div>

    <div class="grid grid-cols-5 gap-2 max-w-7xl mx-auto">
        <div v-for="(cat, cIdx) in gameData.categories" :key="'h-'+cIdx" 
             class="jeopardy-blue border-2 border-white p-2 text-center font-bold text-lg h-20 flex items-center justify-center">
            <span :contenteditable="isEditing" @blur="cat.name = $event.target.innerText">{{ cat.name }}</span>
        </div>

        <template v-for="rIdx in [0,1,2,3,4]">
            <div v-for="(cat, cIdx) in gameData.categories" @click="handleTileClick(cIdx, rIdx)"
                 class="jeopardy-blue border-2 border-white aspect-video flex items-center justify-center text-center p-2 cursor-pointer hover:bg-blue-700 transition-all"
                 :class="{ 'opacity-20 pointer-events-none': cat.questions[rIdx].done && !isEditing }">
                <span v-if="!isEditing" class="jeopardy-gold text-4xl font-bold">{{ (rIdx + 1) * 100 }}</span>
                <span v-else class="text-[10px] uppercase opacity-50">{{ cat.questions[rIdx].q.substring(0,20) }}...</span>
            </div>
        </template>
    </div>

    <div class="fixed bottom-6 left-6 flex gap-4 items-center">
        <button @click="isEditing = !isEditing" class="w-14 h-14 bg-yellow-500 text-black rounded-full shadow-xl flex items-center justify-center text-2xl">
            {{ isEditing ? '▶' : '✎' }}
        </button>
        <button v-if="isEditing" @click="downloadJSON" class="bg-green-600 px-4 py-2 rounded font-bold">Export</button>
    </div>

    <div v-if="activeTile" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-blue-900 border-4 border-white w-full max-w-4xl p-8 rounded-lg relative">
            
            <div v-if="isEditing" class="grid grid-cols-2 gap-6">
                <div>
                    <label class="text-yellow-400 font-bold">FRAGE (Text oder URL)</label>
                    <textarea v-model="activeTile.data.q" class="w-full bg-black p-2 mt-2 h-32 rounded border border-gray-500"></textarea>
                    <label class="text-yellow-400 font-bold mt-4 block">ANTWORT</label>
                    <textarea v-model="activeTile.data.a" class="w-full bg-black p-2 mt-2 h-32 rounded border border-gray-500"></textarea>
                </div>
                <div>
                    <label class="text-yellow-400 font-bold">MEDIEN-TYP</label>
                    <select v-model="activeTile.data.type" class="w-full bg-black p-2 mt-2 border border-gray-500">
                        <option value="text">Nur Text</option>
                        <option value="image">Bild / GIF (URL)</option>
                        <option value="video">Video (MP4 URL)</option>
                        <option value="audio">Audio (MP3 URL)</option>
                    </select>
                    <p class="text-xs mt-4 text-gray-300 italic">Hinweis: Kopiere Bild-URLs oder Dateipfade hierhin. Bei "Text" wird einfach der Text angezeigt.</p>
                </div>
                <button @click="activeTile = null" class="col-span-2 bg-green-600 py-3 font-bold uppercase">Speichern</button>
            </div>

            <div v-else class="text-center">
                <h2 class="text-xl opacity-50 mb-4">{{ activeTile.catName }} - {{ (activeTile.rIdx + 1) * 100 }}</h2>
                
                <div class="media-container mb-8 min-h-[200px] flex items-center justify-center">
                    <div v-if="!showAnswer">
                        <template v-if="activeTile.data.type === 'image'"><img :src="activeTile.data.q" class="rounded shadow-lg"></template>
                        <template v-else-if="activeTile.data.type === 'video'"><video :src="activeTile.data.q" controls autoplay class="w-full"></video></template>
                        <template v-else-if="activeTile.data.type === 'audio'"><audio :src="activeTile.data.q" controls autoplay></audio></template>
                        <p v-else class="text-5xl font-bold">{{ activeTile.data.q }}</p>
                    </div>
                    <p v-else class="text-6xl font-bold text-yellow-400">{{ activeTile.data.a }}</p>
                </div>

                <div class="flex gap-4 justify-center">
                    <button @click="showAnswer = true" v-if="!showAnswer" class="bg-white text-blue-900 px-10 py-4 rounded-full font-bold text-2xl uppercase shadow-lg">Lösung</button>
                    <button @click="closeTile(true)" v-else class="bg-yellow-500 text-black px-10 py-4 rounded-full font-bold text-2xl uppercase shadow-lg">Richtig / Weiter</button>
                    <button @click="activeTile = null" class="border border-white/50 px-6 py-4 rounded-full font-bold uppercase">Abbrechen</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue
createApp({
    data() {
        return {
            isEditing: false, showAnswer: false, activeTile: null,
            gameData: { title: "NEUES SPIEL", categories: Array.from({length: 5}, (_, i) => ({ name: "KAT " + (i+1), questions: Array.from({length: 5}, () => ({ q: "Frage hier", a: "Antwort hier", type: "text", done: false })) })) }
        }
    },
    methods: {
        handleTileClick(cIdx, rIdx) {
            this.activeTile = { cIdx, rIdx, catName: this.gameData.categories[cIdx].name, data: this.gameData.categories[cIdx].questions[rIdx] };
            this.showAnswer = false;
        },
        closeTile(done) { if(done) this.activeTile.data.done = true; this.activeTile = null; },
        triggerUpload() { document.getElementById('fileInput').click(); },
        loadJSON(e) {
            const reader = new FileReader();
            reader.onload = (event) => { this.gameData = JSON.parse(event.target.result); };
            reader.readAsText(e.target.files[0]);
        },
        downloadJSON() {
            const blob = new Blob([JSON.stringify(this.gameData, null, 2)], {type : 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'game.json'; a.click();
        }
    }
}).mount('#app')
</script>
</body>
</html>
