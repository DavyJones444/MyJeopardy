<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Pro - Studio Final</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jeopardy-blue { background-color: #060ce9; }
        .jeopardy-gold { color: #ffcc00; }
        body { overflow: hidden; height: 100vh; width: 100vw; background-color: black; }
        
        /* Die Teams überlagern das Board */
        .team-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding-bottom: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1.5rem;
            pointer-events: none; /* Klicks gehen durch den leeren Raum zum Board durch */
        }

        .podium {
            pointer-events: auto; /* Nur die Podeste selbst fangen Klicks ab */
            background: rgba(6, 12, 233, 0.85); /* Etwas transparent */
            backdrop-filter: blur(10px);
            border: 3px solid white;
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            width: 280px;
            transition: transform 0.3s ease;
        }
        
        .podium:hover { transform: translateY(-10px); }

        .media-content img { max-height: 350px; border: 4px solid white; border-radius: 12px; }
        [contenteditable]:focus { outline: none; background: rgba(255,204,0,0.2); }
    </style>
</head>
<body class="text-white font-sans">

<div id="app" class="h-screen flex flex-col relative">
    
    <div class="p-4 flex justify-between items-center z-10">
        <h1 class="text-3xl font-black jeopardy-gold uppercase italic tracking-tighter" :contenteditable="isEditing" @blur="gameData.title = $event.target.innerText">
            {{ gameData.title }}
        </h1>
        <div class="flex gap-4">
            <input type="file" id="fileInput" class="hidden" @change="loadJSON" accept=".json">
            <button @click="triggerUpload" class="border-2 border-white px-4 py-1 rounded-full text-xs font-bold hover:bg-white hover:text-black transition-colors uppercase">
                Import
            </button>
            <button v-if="isEditing" @click="downloadJSON" class="bg-green-600 px-4 py-1 rounded-full text-xs font-bold uppercase">
                Export
            </button>
        </div>
    </div>

    <div class="flex-grow px-4 pb-48 overflow-hidden flex flex-col items-center">
        <div class="grid grid-cols-5 gap-3 w-full max-w-[1600px] h-full">
            <div v-for="(cat, cIdx) in gameData.categories" :key="'h-'+cIdx" 
                 class="jeopardy-blue border-4 border-white flex items-center justify-center text-center p-2 shadow-2xl">
                <span class="font-black text-lg lg:text-2xl uppercase leading-tight" :contenteditable="isEditing" @blur="cat.name = $event.target.innerText">
                    {{ cat.name }}
                </span>
            </div>

            <template v-for="rIdx in [0,1,2,3,4]">
                <div v-for="(cat, cIdx) in gameData.categories" 
                     @click="handleTileClick(cIdx, rIdx)"
                     class="jeopardy-blue border-4 border-white flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:brightness-125 relative overflow-hidden group"
                     :class="{ 'opacity-10 grayscale': cat.questions[rIdx].done && !isEditing }">
                    
                    <span v-if="!isEditing" class="jeopardy-gold text-4xl lg:text-7xl font-black drop-shadow-md">
                        {{ (rIdx + 1) * 100 }}
                    </span>
                    
                    <div v-else class="p-1 w-full h-full flex flex-col justify-center">
                        <div class="text-[10px] opacity-60 uppercase mb-1" v-html="parseContent(cat.questions[rIdx].q, true)"></div>
                        <div class="text-[10px] text-yellow-500 font-bold truncate italic">A: {{ cat.questions[rIdx].a }}</div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="team-footer h-48">
        <div v-for="(team, tIdx) in gameData.teams" :key="tIdx" class="podium p-6">
            <button @click="removeTeam(tIdx)" class="absolute -top-4 -right-4 bg-red-600 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-auto">✕</button>
            
            <div class="text-center">
                <div class="font-bold uppercase text-sm lg:text-base tracking-widest mb-1" contenteditable="true" @blur="team.name = $event.target.innerText">
                    {{ team.name }}
                </div>
                <div class="text-6xl font-black jeopardy-gold" contenteditable="true" @blur="team.score = parseInt($event.target.innerText) || 0">
                    {{ team.score }}
                </div>
            </div>
        </div>

        <button @click="addTeam" class="pointer-events-auto mb-10 w-12 h-12 bg-white/10 border-2 border-dashed border-white/30 rounded-full flex items-center justify-center hover:bg-white/20 transition-all text-2xl">
            +
        </button>
    </div>

    <button @click="isEditing = !isEditing" class="fixed left-6 bottom-52 z-[60] w-16 h-16 bg-yellow-500 text-black rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition-transform">
        {{ isEditing ? '▶' : '✎' }}
    </button>

    <div v-if="activeTile" class="fixed inset-0 bg-blue-950/95 flex items-center justify-center z-[100] p-6 lg:p-20">
        <div class="bg-blue-900 border-8 border-white w-full max-w-6xl p-10 rounded-3xl relative shadow-[0_0_150px_rgba(255,255,255,0.2)]">
            
            <div v-if="isEditing">
                <h3 class="text-yellow-400 font-black mb-6 uppercase text-3xl italic">Editor</h3>
                <div class="grid md:grid-cols-2 gap-10">
                    <div>
                        <label class="text-xs font-bold text-white/50 uppercase">Frage & Media /image()</label>
                        <textarea v-model="activeTile.data.q" class="w-full bg-black/50 p-6 mt-2 h-64 rounded-xl border-4 border-white/20 text-2xl"></textarea>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-white/50 uppercase">Antwort</label>
                        <textarea v-model="activeTile.data.a" class="w-full bg-black/50 p-6 mt-2 h-64 rounded-xl border-4 border-white/20 text-2xl"></textarea>
                    </div>
                </div>
                <button @click="activeTile = null" class="w-full bg-green-600 mt-10 py-5 font-black uppercase text-2xl rounded-2xl">Speichern</button>
            </div>

            <div v-else class="text-center">
                <div class="uppercase text-white/40 mb-10 text-2xl font-black tracking-widest italic">{{ activeTile.catName }} | {{ activeTile.value }}</div>
                <div class="media-content mb-16 min-h-[350px] flex items-center justify-center text-4xl lg:text-7xl font-black">
                    <div v-html="parseContent(showAnswer ? activeTile.data.a : activeTile.data.q)"></div>
                </div>

                <div class="flex flex-col gap-8 items-center">
                    <button @click="showAnswer = true" v-if="!showAnswer" class="bg-white text-blue-900 px-20 py-8 rounded-full font-black text-4xl uppercase shadow-[0_12px_0_#999] active:translate-y-2 active:shadow-none transition-all">Lösung!</button>
                    
                    <div v-else class="w-full animate-bounce-in">
                        <p class="text-yellow-500 uppercase font-black text-xl mb-6 italic tracking-tighter">Punktesieg für:</p>
                        <div class="flex flex-wrap gap-6 justify-center">
                            <button v-for="(team, tIdx) in gameData.teams" @click="assignPoints(tIdx)" class="bg-blue-600 hover:bg-blue-500 border-4 border-white px-8 py-4 rounded-2xl font-black uppercase text-xl transition-transform hover:scale-110">
                                {{ team.name }}
                            </button>
                            <button @click="closeTile(true)" class="bg-gray-800 px-8 py-4 rounded-2xl font-black uppercase text-xl">Niemand</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue
createApp({
    data() {
        return {
            isEditing: false, showAnswer: false, activeTile: null,
            gameData: { title: "TV SHOW JEOPARDY", teams: [{ name: "TEAM 1", score: 0 }, { name: "TEAM 2", score: 0 }], categories: Array.from({length: 5}, (_, i) => ({ name: "KATEGORIE " + (i+1), questions: Array.from({length: 5}, () => ({ q: "Frage...", a: "Antwort...", done: false })) })) }
        }
    },
    methods: {
        parseContent(text, isPreview = false) {
            if (!text) return "";
            const mediaRegex = /\/(image|video|audio)\(([^)]+)\)/g;
            return text.replace(mediaRegex, (match, type, url) => {
                if (type === 'image') return `<img src="${url}" class="${isPreview ? '' : 'mx-auto shadow-2xl'}">`;
                return isPreview ? `[${type.toUpperCase()}]` : `<${type} src="${url}" controls autoplay class="mx-auto"></${type}>`;
            });
        },
        handleTileClick(cIdx, rIdx) {
            this.activeTile = { cIdx, rIdx, value: (rIdx + 1) * 100, catName: this.gameData.categories[cIdx].name, data: this.gameData.categories[cIdx].questions[rIdx] };
            this.showAnswer = false;
        },
        assignPoints(teamIdx) { this.gameData.teams[teamIdx].score += this.activeTile.value; this.closeTile(true); },
        closeTile(done) { if(done) this.activeTile.data.done = true; this.activeTile = null; },
        addTeam() { this.gameData.teams.push({ name: "TEAM " + (this.gameData.teams.length + 1), score: 0 }); },
        removeTeam(idx) { if(confirm("Löschen?")) this.gameData.teams.splice(idx, 1); },
        triggerUpload() { document.getElementById('fileInput').click(); },
        loadJSON(e) {
            const reader = new FileReader();
            reader.onload = (event) => { try { this.gameData = JSON.parse(event.target.result); } catch(e) { alert("Fehler!"); } };
            reader.readAsText(e.target.files[0]);
        },
        downloadJSON() {
            const blob = new Blob([JSON.stringify(this.gameData, null, 2)], {type : 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'game.json'; a.click();
        }
    }
}).mount('#app')
</script>
</body>
</html>
